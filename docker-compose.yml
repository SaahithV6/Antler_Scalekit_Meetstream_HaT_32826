version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
      - "3002:3002"
    env_file:
      - .env
    volumes:
      - ./shared:/app/shared

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_WS_URL=ws://backend:3002
      - NEXT_PUBLIC_BACKEND_API_URL=http://backend:3001
    depends_on:
      - backend
